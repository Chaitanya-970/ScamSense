<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScamSense</title>
  <style>
    /* ── Fonts ── */
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap');

    /* ── Variables ── */
    :root {
      --bg:         #0b0e14;
      --surface:    #131720;
      --border:     #1e2535;
      --accent:     #00e5ff;
      --accent2:    #7c4dff;
      --text:       #d4dce8;
      --muted:      #4a5568;
      --danger:     #ff3b3b;
      --safe:       #00c853;
      --warn:       #ffd600;
      --radius:     10px;
      --font-ui:    'Syne', sans-serif;
      --font-mono:  'Share Tech Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0d1117 0%, #131720 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(0,229,255,0.08), transparent 70%);
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0,229,255,0.3);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .logo-text span { color: var(--accent); }

    .tagline {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--safe);
      box-shadow: 0 0 6px var(--safe);
      flex-shrink: 0;
    }
    #status-dot.pulsing {
      animation: pulse 0.8s infinite alternate;
    }
    @keyframes pulse {
      from { opacity: 1; box-shadow: 0 0 6px var(--accent); background: var(--accent); }
      to   { opacity: 0.4; box-shadow: 0 0 2px var(--accent); }
    }

    /* ── Section wrapper ── */
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 9px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Dashboard grid ── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .stat-label {
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--danger);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat-value.safe { color: var(--safe); }

    /* ── Security gauge (spans full width) ── */
    .gauge-card {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .gauge-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .gauge-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .gauge-label.secure { color: var(--safe); }
    .gauge-label.caution { color: var(--warn); }
    .gauge-label.risk    { color: var(--danger); }

    .gauge-track {
      background: #1a1f2e;
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #gauge-bar {
      height: 100%;
      border-radius: 20px;
      width: 100%;
      background: linear-gradient(90deg, var(--safe), #69f0ae);
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.4s ease;
    }
    .gauge-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .gauge-tick {
      font-size: 8px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    /* ── Transcript box ── */
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 10px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,229,255,0.08);
    }
    textarea::placeholder { color: var(--muted); }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.3px;
    }

    #analyze-btn {
      flex: 1;
      padding: 9px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      letter-spacing: 0.5px;
    }
    #analyze-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,229,255,0.3);
    }
    #analyze-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #reset-btn {
      padding: 9px 12px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    #reset-btn:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(255,59,59,0.06);
    }

    /* ── Result box ── */
    .result-box {
      margin-top: 10px;
      border-radius: var(--radius);
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.6;
      white-space: pre-line;
      border: 1px solid;
      transition: all 0.2s ease;
    }
    .result-box.hidden { display: none; }

    .result-box.danger {
      background: rgba(255,59,59,0.08);
      border-color: rgba(255,59,59,0.4);
      color: #ff7c7c;
    }
    .result-box.safe {
      background: rgba(0,200,83,0.07);
      border-color: rgba(0,200,83,0.3);
      color: #69f0ae;
    }
    .result-box.warning {
      background: rgba(255,214,0,0.07);
      border-color: rgba(255,214,0,0.3);
      color: var(--warn);
    }
    .result-box.error {
      background: rgba(124,77,255,0.07);
      border-color: rgba(124,77,255,0.3);
      color: #b39ddb;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      font-size: 9px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
    }
    .footer strong { color: var(--accent); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo-icon">🛡️</div>
    <div>
      <div class="logo-text">Scam<span>Sense</span></div>
      <div class="tagline">AI Scam Detection</div>
    </div>
    <div id="status-dot" title="Scanning active"></div>
  </div>

  <!-- Dashboard -->
  <div class="section">
    <div class="section-title">// Live Dashboard</div>
    <div class="dash-grid">

      <div class="stat-card">
        <div class="stat-label">Threats Prevented</div>
        <div class="stat-value" id="threats-count">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Session Scans</div>
        <div class="stat-value safe" id="scans-count">—</div>
      </div>

      <div class="gauge-card">
        <div class="gauge-header">
          <div class="stat-label" style="margin:0;">Security Level</div>
          <div id="gauge-label" class="gauge-label secure">SECURE</div>
        </div>
        <div class="gauge-track">
          <div id="gauge-bar"></div>
        </div>
        <div class="gauge-ticks">
          <span class="gauge-tick">0</span>
          <span class="gauge-tick">25</span>
          <span class="gauge-tick">50</span>
          <span class="gauge-tick">75</span>
          <span class="gauge-tick">100</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Transcript Analyzer -->
  <div class="section">
    <div class="section-title">// Transcript Analyzer</div>
    <textarea
      id="transcript-input"
      placeholder="Paste a suspicious call transcript or message here to analyze it…"
    ></textarea>

    <div class="result-box hidden" id="result-box">
      <span id="result-text"></span>
    </div>

    <div class="btn-row">
      <button id="analyze-btn">⚡ Analyze Transcript</button>
      <button id="reset-btn" title="Reset all stats">↺ Reset</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Powered by <strong>ScamSense ML Engine</strong> · v1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
